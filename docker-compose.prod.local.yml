services:
  backend: &backend
    container_name: backend
    restart: always
    build:
      context: .
      dockerfile: ./backend/Dockerfile.prod
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - static_volume:/home/app/backend/staticfiles
      - media_volume:/home/app/backend/mediafiles
    expose:
      - 8000
    env_file:
      - ./.env.prod.local
    depends_on:
      backend_db:
        condition: service_healthy
      redis:
        condition: service_healthy

  websockets:
    container_name: websockets
    restart: always
    build:
      context: .
      dockerfile: ./backend/Dockerfile.prod
    command: daphne --proxy-headers -b 0.0.0.0 -p 9000 -v 3 config.asgi:application
    entrypoint: []
    volumes:
      - media_volume:/home/app/backend/mediafiles
    expose:
      - 9000
    env_file:
      - ./.env.prod.local
    depends_on:
      backend_db:
        condition: service_healthy
      redis:
        condition: service_healthy

  backend_db:
    container_name: backend_db
    image: postgres:15
    restart: always
    env_file:
      - ./.env.prod.local
    volumes:
      - backend_db_data:/var/lib/postgresql/data/
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    container_name: redis
    image: redis:6.2-alpine
    command: redis-server  --appendonly yes  --appendfsync everysec  --save 60 1  --loglevel notice
    expose:
      - 6379
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3

  celery:
    <<: *backend
    container_name: celery
    restart: always
    command: celery -A config worker --loglevel=info -n worker1
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    entrypoint: []
    ports: []

  celery-beat:
    <<: *backend
    container_name: celery-beat
    restart: always
    command: celery -A config beat
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    entrypoint: []
    ports: []

  nginx:
    container_name: nginx
    restart: always
    build:
      context: .
      dockerfile: ./frontend/Dockerfile.prod.local
      args:
        VITE_APP_BUILD_VERSION: ${VITE_APP_BUILD_VERSION}
    volumes:
      - static_volume:/home/app/backend/staticfiles
      - media_volume:/home/app/backend/mediafiles
    depends_on:
      backend:
        condition: service_started
      websockets:
        condition: service_started
    ports:
      - 80:80
    env_file:
      - ./.env.prod.local

volumes:
  backend_db_data:
  static_volume:
  media_volume:
  redis_data:
