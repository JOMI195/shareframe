services:
  backend: &backend
    container_name: backend-dev
    restart: unless-stopped
    build:
      context: ./backend
      dockerfile: ./Dockerfile.dev
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend/:/app/backend
    ports:
      - 8000:8000
    env_file:
      - ./.env.dev
    depends_on:
      backend_db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend_network
      - backend_db_network
      - redis_network

  websockets:
    container_name: websockets-dev
    restart: unless-stopped
    build:
      context: ./backend
      dockerfile: ./Dockerfile.dev
    command: daphne --proxy-headers -b 0.0.0.0 -p 9000 -v 3 config.asgi:application
    entrypoint: []
    volumes:
      - ./backend/:/app/backend
    ports:
      - 9000:9000
    env_file:
      - ./.env.dev
    depends_on:
      backend_db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend_network
      - backend_db_network
      - redis_network

  backend_db:
    container_name: backend_db-dev
    image: postgres:15
    restart: unless-stopped
    ports:
      - 5432:5432
    volumes:
      - backend_db_data:/var/lib/postgresql/data/
    env_file:
      - ./.env.dev
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend_db_network

  redis:
    container_name: redis-dev
    image: redis:6.2-alpine
    restart: unless-stopped
    command: redis-server  --appendonly yes  --appendfsync everysec  --save 60 1  --loglevel notice
    ports:
      - 6379:6379
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - redis_network

  celery:
    container_name: celery-dev
    <<: *backend
    command: celery -A config worker --loglevel=info -n worker1
    depends_on:
      - redis
    entrypoint: []
    ports: []
    networks:
      - backend_network
      - backend_db_network
      - redis_network

  celery-beat:
    container_name: celery-beat-dev
    <<: *backend
    command: celery -A config beat
    depends_on:
      - redis
    entrypoint: []
    ports: []
    networks:
      - backend_network
      - backend_db_network
      - redis_network

  frontend:
    container_name: frontend-dev
    restart: unless-stopped
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
      args:
        VITE_APP_BUILD_VERSION: ${VITE_APP_BUILD_VERSION}
    volumes:
      - ./frontend:/app/frontend
      - node_modules:/app/frontend/node_modules
    env_file:
      - ./.env.dev
    ports:
      - "3000:3000"
    networks:
      - frontend_network

volumes:
  backend_db_data:
  node_modules: {}
  redis_data:

networks:
  frontend_network:
    driver: bridge
  backend_network:
    driver: bridge
  backend_db_network:
    driver: bridge
  redis_network:
    driver: bridge