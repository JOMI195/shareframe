name: Build and Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    
    steps:
      - name: Build and redeploy application
        working-directory: /home/jomi/shareframe
        run: |
          echo "Starting build and deployment..."
          sudo ./app-command.sh docker-compose.yml .env.prod "up -d --build" all 2>&1
          echo "Deployment completed with exit code: $?"
