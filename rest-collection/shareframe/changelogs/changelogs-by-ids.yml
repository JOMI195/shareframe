info:
  name: changelogs-by-ids
  type: http
  seq: 2

http:
  method: POST
  url: "{{http_domain}}/api/changelogs/by-ids/"
  body:
    type: json
    data: |-
      {
          "ids": [1, 2]
      }
  auth:
    type: bearer
    token: "{{env_auth_token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
