info:
  name: reset-password-confirm
  type: http
  seq: 8

http:
  method: POST
  url: "{{http_domain}}/api/auth/users/reset_password_confirm/"
  body:
    type: json
    data: |-
      {
          "uid": "<uid-from-email>",
          "token": "<token-from-email>",
          "new_password": "<new-password>",
          "re_new_password": "<new-password>"
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
