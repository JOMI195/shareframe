info:
  name: set-password
  type: http
  seq: 6

http:
  method: POST
  url: "{{http_domain}}/api/auth/users/set_password/"
  body:
    type: json
    data: |-
      {
          "new_password": "<new-password>",
          "re_new_password": "<new-password>",
          "current_password": "{{backend_admin_password}}"
      }
  auth:
    type: bearer
    token: "{{env_auth_token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
