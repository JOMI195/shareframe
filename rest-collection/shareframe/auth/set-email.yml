info:
  name: set-email
  type: http
  seq: 9

http:
  method: POST
  url: "{{http_domain}}/api/auth/users/set_username/"
  body:
    type: json
    data: |-
      {
          "new_email": "<new-email>",
          "current_password": "{{backend_admin_password}}"
      }
  auth:
    type: bearer
    token: "{{env_auth_token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
