info:
  name: reset-password
  type: http
  seq: 7

http:
  method: POST
  url: "{{http_domain}}/api/auth/users/reset_password/"
  body:
    type: json
    data: |-
      {
          "email": "{{backend_admin_email}}"
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
