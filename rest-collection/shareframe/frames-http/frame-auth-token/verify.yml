info:
  name: verify
  type: http
  seq: 2

http:
  method: POST
  url: "{{http_domain}}/api/frames/verify-frame-auth-token/"
  body:
    type: json
    data: |-
      {
          "access_token": "{{frame_access_token}}"
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
