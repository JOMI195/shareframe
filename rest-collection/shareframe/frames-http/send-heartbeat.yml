info:
  name: send-heartbeat
  type: http
  seq: 6

http:
  method: POST
  url: "{{http_domain}}/api/frames/frame-hearbeat/"
  headers:
    - name: Authorization
      value: Frame-Access-Token {{frame_access_token}}
  body:
    type: json
    data: |-
      {
          "local_ip_address": "192.168.0.10",
          "version": "1.0.1"
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
