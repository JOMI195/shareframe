info:
  name: obtain-frame-ws-auth-token
  type: http
  seq: 2

http:
  method: POST
  url: "{{http_domain}}/api/frames/obtain-frame-ws-auth-token/"
  body:
    type: json
    data: |-
      {
          "private_serial_number": "{{frame_private_serial_number}}"
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
