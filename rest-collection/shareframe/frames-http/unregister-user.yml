info:
  name: unregister-user
  type: http
  seq: 4

http:
  method: POST
  url: "{{http_domain}}/api/frames/unregister-user/"
  body:
    type: json
    data: |-
      {
          "public_serial_number": "{{frame_public_serial_number}}"
      }
  auth:
    type: bearer
    token: "{{env_auth_token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
