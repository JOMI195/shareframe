info:
  name: frames
  type: websocket
  seq: 1

websocket:
  url: "{{ws_domain}}/ws/frames/"
  headers:
    - name: Authorization
      value: Frame-Access-Token {{frame_access_token}}
    - name: Origin
      value: "{{ws_domain}}"
  message:
    type: json
    data: |-
      {}
  auth: inherit

settings:
  timeout: 0
  keepAliveInterval: 0
