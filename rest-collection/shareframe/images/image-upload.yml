info:
  name: image-upload
  type: http
  seq: 3

http:
  method: POST
  url: "{{http_domain}}/api/images/"
  body:
    type: multipart-form
    data:
      - name: image
        type: file
        value: []
      - name: upload_image_sha256_hex_hash
        type: text
        value: "<sha256-of-upload>"
  auth:
    type: bearer
    token: "{{env_auth_token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
