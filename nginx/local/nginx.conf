load_module modules/ngx_http_geoip_module.so;
load_module modules/ngx_stream_geoip_module.so;

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;


events {
    worker_connections  1024;
}


http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
    
    access_log  /var/log/nginx/access.log  main;

    geoip_country /etc/nginx/GeoIP.dat;
    geoip_city /etc/nginx/GeoIPCity.dat;

    sendfile on;
    client_max_body_size 100M;

    keepalive_timeout  65;

    # Gzip configuration
    gzip_static on;
    gzip on;
    gzip_disable "msie6";

    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 0;
    gzip_types text/plain application/javascript text/css application/json application/x-javascript text/xml application/xml application/xml+rss text/javascript application/vnd.ms-fontobject application/x-font-ttf font/opentype;

    map $http_upgrade $connection_upgrade {
        default Upgrade;
        '' close;
    }

    server {
        listen 80;
        server_name localhost;
        server_tokens off;

        location / {
            root /usr/share/nginx/html;
            index index.html index.htm;
            try_files $uri $uri/ /index.html =404;
        }

        location /api/static/ {
            alias /home/app/backend/staticfiles/;
        }

        location /api/media/protected/frame-updates/ {
            internal;
            alias /home/app/backend/mediafiles/frame-updates/;
        }

        location /api/media/protected/private/ {
            internal;
            alias /home/app/backend/mediafiles/private/;
        }

        location /api/ {
            try_files $uri @proxy_api;
        }

        location /ws/ {
            try_files $uri @proxy_websocket;
        }

        location @proxy_websocket {
            gzip off;
            chunked_transfer_encoding off;
            keepalive_timeout 0;

            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;
            
            proxy_set_header   Host $host;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Frame-Options SAMEORIGIN;
            proxy_set_header   X-Forwarded-Host $server_name;
            proxy_set_header   X-Real-IP $remote_addr;

            proxy_buffering off;
            proxy_cache off;
            proxy_cache_bypass $http_upgrade;

            proxy_pass http://websockets:9000;
        }

        location @proxy_api {
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Host $host;
            proxy_redirect off;
            proxy_pass http://backend:8000;
        }
    }
}
